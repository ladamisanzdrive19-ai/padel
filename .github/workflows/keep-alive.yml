name: Marcapasos Supabase

on:
  schedule:
    # Se ejecuta cada 2 días a las 00:00 (muy por debajo del límite de 7 días)
    - cron: '0 0 */2 * *'
  workflow_dispatch: # Esto permite que tú lo pruebes a mano cuando quieras

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hacer consulta de lectura
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/reservas?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
